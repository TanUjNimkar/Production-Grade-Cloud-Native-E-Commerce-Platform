apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: cloudnative-commerce-hpa
  namespace: cloudnative-commerce

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cloudnative-commerce

  minReplicas: 2
  maxReplicas: 5

  metrics:
    - type: Resource

      resource:
        name: cpu

        target:
          type: Utilization
          averageUtilization: 70